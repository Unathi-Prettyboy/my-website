<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
    }

    header h1 {
      margin: 0;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    nav a {
      color: #38bdf8;
      text-decoration: none;
    }

    section {
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1e293b;
    }
  </style>
</head>
<body>

<header>
  <h1>Prettyboy's Website</h1>
  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="about">
  <div class="card">
    <h2>About Me</h2>
    <p>I am passionate about business, health, emotions, and life. I enjoy learning, gaming, and growing every day.</p>
  </div>
</section>

<section id="projects">
  <div class="card">
    <h2>Projects</h2>
    <p>Coming soon...</p>
    <button onclick="showMessage()">Click Me</button>
  </div>
</section>

<section id="contact">
  <div class="card">
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
  </div>
</section>

<footer>
  <p>© 2026 Prettyboy</p>
</footer>

<script>
  function showMessage() {
    alert("Welcome to my website 🚀");
  }
</script>

</body>
</html>
